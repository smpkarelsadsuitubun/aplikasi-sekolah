<style>
/* ========== CSS RESET & VARIABEL ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--blue-900:#0a1f44;--blue-800:#0d2b5e;--blue-700:#0f3575;--blue-600:#1545a0;
--blue-500:#1a56c4;--blue-400:#3b82f6;--blue-300:#60a5fa;--blue-200:#93c5fd;
--blue-100:#dbeafe;--blue-50:#eff6ff;
--white:#ffffff;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;
--gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;
--gray-700:#334155;--gray-800:#1e293b;--gray-900:#0f172a;
--green-500:#16a34a;--green-600:#15803d;--red-500:#dc2626;--red-600:#b91c1c;
--orange-500:#f97316;--orange-600:#ea580c;--teal-500:#0d9488;
--sidebar-w:256px;--topbar-h:58px;--radius:10px;
}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;color:var(--gray-800);background:var(--blue-50);min-height:100vh;overflow-x:hidden}

/* ========== HALAMAN LOGIN ========== */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;
background:linear-gradient(160deg,var(--blue-900) 0%,var(--blue-700) 40%,var(--blue-600) 100%);
position:relative;overflow:hidden;padding:16px}
#loginPage::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;
background:radial-gradient(circle,rgba(59,130,246,.15),transparent 70%);top:-150px;right:-100px;animation:pulseGlow 6s ease-in-out infinite}
#loginPage::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;
background:radial-gradient(circle,rgba(96,165,250,.1),transparent 70%);bottom:-120px;left:-80px;animation:pulseGlow 8s ease-in-out infinite 2s}
@keyframes pulseGlow{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:1}}
.login-card{background:rgba(255,255,255,.97);backdrop-filter:blur(24px);border-radius:20px;
padding:40px 32px 32px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.1);
position:relative;z-index:2}
.login-card .logo-area{text-align:center;margin-bottom:20px}
.login-card .logo-area img{width:88px;height:88px;border-radius:14px;object-fit:contain;
background:var(--blue-50);border:2px solid var(--blue-100);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.login-card h2{text-align:center;font-size:1.15rem;font-weight:800;color:var(--blue-800);margin-bottom:3px}
.login-card .subtitle{text-align:center;color:var(--gray-500);font-size:.8rem;margin-bottom:24px;letter-spacing:.3px}
.login-error{background:#fef2f2;color:var(--red-600);padding:10px 14px;border-radius:8px;font-size:.8rem;
margin-bottom:14px;display:none;border:1px solid #fecaca;font-weight:500}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:.76rem;font-weight:700;margin-bottom:5px;color:var(--blue-800);text-transform:uppercase;letter-spacing:.5px}
.fg .iw{position:relative}
.fg .iw i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--gray-400);font-size:.85rem}
.fg input{width:100%;padding:11px 14px 11px 40px;border:1.5px solid var(--gray-200);border-radius:9px;
font-size:.88rem;font-family:inherit;background:var(--white);transition:all .2s;color:var(--gray-800)}
.fg input:focus{outline:none;border-color:var(--blue-400);box-shadow:0 0 0 3px rgba(59,130,246,.12);background:var(--white)}
.yt-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:22px;
padding:11px;background:#ff0000;color:#fff;border-radius:9px;text-decoration:none;
font-size:.8rem;font-weight:700;transition:all .2s;letter-spacing:.2px}
.yt-btn:hover{background:#cc0000;transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,0,0,.3)}

/* ========== TOMBOL ========== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border:none;
border-radius:8px;font-size:.82rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-blue{background:var(--blue-600);color:#fff}.btn-blue:hover{background:var(--blue-700)}
.btn-green{background:var(--green-600);color:#fff}.btn-green:hover{background:var(--green-500)}
.btn-red{background:var(--red-600);color:#fff}.btn-red:hover{background:var(--red-500)}
.btn-outline{background:transparent;border:1.5px solid var(--gray-300);color:var(--blue-700)}
.btn-outline:hover{background:var(--blue-50);border-color:var(--blue-300)}
.btn-white{background:var(--white);color:var(--blue-700);border:1.5px solid var(--gray-200)}
.btn-white:hover{background:var(--blue-50)}
.btn-sm{padding:6px 13px;font-size:.76rem}
.btn-full{width:100%;padding:12px;font-size:.9rem}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.btn-login{width:100%;padding:13px;font-size:.92rem;border-radius:10px;font-weight:700;margin-top:4px;
background:linear-gradient(135deg,var(--blue-600),var(--blue-500));color:#fff;border:none;
box-shadow:0 4px 14px rgba(21,69,160,.3);transition:all .2s}
.btn-login:hover{box-shadow:0 6px 20px rgba(21,69,160,.4);transform:translateY(-1px)}

/* ========== LAYOUT UTAMA ========== */
#mainApp{display:none;min-height:100vh}
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:linear-gradient(180deg,var(--blue-900),var(--blue-800));
color:rgba(255,255,255,.85);z-index:100;overflow-y:auto;overflow-x:hidden;transition:transform .3s cubic-bezier(.4,0,.2,1);
display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
.sb-head{padding:16px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:11px;flex-shrink:0}
.sb-head img{width:36px;height:36px;border-radius:9px;object-fit:contain;background:rgba(255,255,255,.9);flex-shrink:0}
.sb-head .t1{font-size:.82rem;font-weight:800;line-height:1.2;color:#fff}
.sb-head .t2{font-size:.62rem;opacity:.6;font-weight:400}
.sb-nav{flex:1;padding:8px 0}
.ni{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:.8rem;cursor:pointer;
transition:all .15s;border-left:3px solid transparent;color:rgba(255,255,255,.7);text-decoration:none}
.ni:hover{background:rgba(255,255,255,.06);color:#fff}
.ni.act{background:rgba(59,130,246,.15);border-left-color:var(--blue-300);color:#fff;font-weight:600}
.ni i.ico{width:18px;text-align:center;font-size:.85rem;flex-shrink:0}
.nst{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:.8rem;cursor:pointer;
transition:all .15s;border-left:3px solid transparent;color:rgba(255,255,255,.7)}
.nst:hover{background:rgba(255,255,255,.06);color:#fff}
.nst.act{border-left-color:var(--blue-300);color:#fff;font-weight:600}
.nst i.chv{margin-left:auto;font-size:.6rem;transition:transform .25s}
.nst.open i.chv{transform:rotate(90deg)}
.nsub{max-height:0;overflow:hidden;transition:max-height .35s ease}
.nsub.open{max-height:500px}
.nsub .ni{padding:7px 18px 7px 46px;font-size:.75rem;border-left:none}
.nsub .ni.act{background:rgba(59,130,246,.12);border-left:none}
.sb-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}

/* Topbar */
.topbar{position:fixed;top:0;left:var(--sidebar-w);right:0;height:var(--topbar-h);background:var(--white);
border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;
padding:0 22px;z-index:90;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.tb-left{display:flex;align-items:center;gap:12px}
.hamburger{display:none;background:none;border:none;font-size:1.15rem;color:var(--blue-700);cursor:pointer;padding:6px;border-radius:6px}
.hamburger:hover{background:var(--blue-50)}
.tb-title{font-size:.92rem;font-weight:800;color:var(--blue-800)}
.tb-right{display:flex;align-items:center;gap:10px}
.ubadge{font-size:.72rem;color:var(--gray-500);background:var(--gray-100);padding:5px 12px;border-radius:6px;font-weight:600}

/* Content */
.content{margin-left:var(--sidebar-w);margin-top:var(--topbar-h);padding:24px;min-height:calc(100vh - var(--topbar-h))}
.page{display:none;animation:fadeUp .28s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ========== KARTU & STAT ========== */
.card{background:var(--white);border-radius:var(--radius);box-shadow:0 1px 4px rgba(0,0,0,.04),0 0 0 1px rgba(0,0,0,.02);
padding:20px;margin-bottom:18px}
.ct{font-size:.88rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--blue-800)}
.ct i{color:var(--blue-400);font-size:.9rem}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:20px}
.sc{background:var(--white);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;gap:14px;
box-shadow:0 1px 4px rgba(0,0,0,.04),0 0 0 1px rgba(0,0,0,.02);position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;
background:linear-gradient(135deg,rgba(59,130,246,.06),transparent)}
.si{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0}
.si-blue{background:linear-gradient(135deg,var(--blue-100),var(--blue-50));color:var(--blue-600)}
.si-teal{background:linear-gradient(135deg,#ccfbf1,#f0fdfa);color:var(--teal-500)}
.si-green{background:linear-gradient(135deg,#dcfce7,#f0fdf4);color:var(--green-600)}
.sf .sl{font-size:.7rem;color:var(--gray-500);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.sf .sv{font-size:1.6rem;font-weight:900;color:var(--blue-800);line-height:1.2;margin-top:2px}
.slogo{width:56px;height:56px;border-radius:10px;object-fit:contain;margin-left:auto;flex-shrink:0;background:var(--blue-50)}

/* Pengumuman */
.pgm-box{background:linear-gradient(135deg,var(--blue-50),var(--white));border-left:4px solid var(--blue-400);
border-radius:0 var(--radius) var(--radius) 0;padding:18px 20px;margin-bottom:18px;
box-shadow:0 1px 4px rgba(0,0,0,.03)}
.pgm-box h4{font-size:.84rem;margin-bottom:8px;color:var(--blue-800);display:flex;align-items:center;gap:6px}
.pgm-box p{font-size:.82rem;color:var(--gray-700);line-height:1.7}
.jadwal-img{max-width:100%;border-radius:8px;margin-top:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}

/* ========== TABEL ========== */
.tw{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--gray-200);background:var(--white)}
table{width:100%;border-collapse:collapse;font-size:.78rem}
thead{background:linear-gradient(135deg,var(--blue-700),var(--blue-600));color:#fff}
th{padding:10px 14px;text-align:left;font-weight:700;white-space:nowrap;font-size:.76rem;text-transform:uppercase;letter-spacing:.3px}
td{padding:8px 14px;border-bottom:1px solid var(--gray-100)}
tbody tr:nth-child(even){background:var(--blue-50)}
tbody tr:hover{background:var(--blue-100)}
.sh{color:var(--green-600);font-weight:700}
.sm{color:var(--orange-600);font-weight:600}
.slo{color:var(--red-600);font-weight:700}
.pw-code{background:var(--blue-50);padding:2px 8px;border-radius:5px;font-family:'Courier New',monospace;
font-size:.78rem;font-weight:700;color:var(--blue-700);border:1px solid var(--blue-100)}

/* Search */
.sw{position:relative;margin-bottom:14px}
.sw i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--gray-400);font-size:.82rem}
.sw input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--gray-200);border-radius:9px;
font-size:.83rem;font-family:inherit;background:var(--white);transition:all .2s}
.sw input:focus{outline:none;border-color:var(--blue-400);box-shadow:0 0 0 3px rgba(59,130,246,.1)}

/* Btn group */
.bg{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}

/* Settings */
.set-logo{width:110px;height:110px;border-radius:14px;object-fit:contain;background:var(--blue-50);
border:2px solid var(--gray-200);margin-bottom:12px}
.set-section{margin-bottom:18px}
.set-section label{display:block;font-size:.76rem;font-weight:700;margin-bottom:6px;color:var(--blue-800);text-transform:uppercase;letter-spacing:.3px}
.set-section textarea{width:100%;min-height:90px;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:9px;
font-family:inherit;font-size:.82rem;resize:vertical;transition:border-color .2s;line-height:1.6}
.set-section textarea:focus{outline:none;border-color:var(--blue-400);box-shadow:0 0 0 3px rgba(59,130,246,.1)}

/* Toast */
.toast-c{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 18px;border-radius:9px;font-size:.82rem;font-weight:600;color:#fff;
box-shadow:0 8px 24px rgba(0,0,0,.15);animation:toastIn .3s ease;display:flex;align-items:center;gap:8px;
max-width:340px;pointer-events:auto}
.toast.ok{background:var(--green-600)}.toast.err{background:var(--red-600)}.toast.inf{background:var(--blue-600)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* Overlay */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:95;backdrop-filter:blur(2px)}
.sb-overlay.open{display:block}

/* Placeholder STS */
.sts-ph{text-align:center;padding:60px 20px;color:var(--gray-500)}
.sts-ph i{font-size:2.8rem;color:var(--blue-200);margin-bottom:14px;display:block}
.sts-ph h3{color:var(--blue-700);margin-bottom:6px;font-size:1rem}
.sts-ph p{font-size:.82rem}

/* ========== RESPONSIF ========== */
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.sb-overlay.open{display:block}
.topbar{left:0}
.content{margin-left:0;padding:16px}
.hamburger{display:block}
.sg{grid-template-columns:1fr}
.bg{flex-direction:column}
.bg .btn{width:100%}
.login-card{padding:30px 22px 24px}
.sc{padding:14px 16px}
.sf .sv{font-size:1.3rem}
.slogo{width:44px;height:44px}
}
@media(min-width:769px) and (max-width:1024px){
.sidebar{width:230px}
.topbar{left:230px}
.content{margin-left:230px}
}
@media print{.sidebar,.topbar,.hamburger,.btn,.sw,.bg{display:none!important}.content{margin:0;padding:8px}}

.hidden{display:none!important}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gray-400)}
</style>
</head>

const n=$('sbNav');let h='';
h+=`<div class="ni${curPage==='dash'?' act':''}" onclick="navTo('dash')"><i class="fas fa-home ico"></i> Dashboard</div>`;
h+=`<div class="nst${curPage==='sts'?' act':''}${curPage==='sts'?' open':''}" onclick="togSTSM(this)"><i class="fas fa-chart-bar ico"></i> Hasil STS<i class="fas fa-chevron-right chv"></i></div>`;
h+=`<div class="nsub${curPage==='sts'?' open':''}">`;
MAPEL.forEach(m=>{h+=`<div class="ni${curMapel===m.id?' act':''}" onclick="selMapel('${m.id}')">${m.nm}</div>`});
h+=`</div>`;
h+=`<div class="ni${curPage==='up'?' act':''}" onclick="navTo('up')"><i class="fas fa-key ico"></i> User Password</div>`;
if(role==='admin')h+=`<div class="ni${curPage==='set'?' act':''}" onclick="navTo('set')"><i class="fas fa-cog ico"></i> Pengaturan</div>`;
n.innerHTML=h;
}
function togSTSM(el){el.classList.toggle('open');el.nextElementSibling.classList.toggle('open')}
function togSB(){$('sb').classList.toggle('open');$('sbOv').classList.toggle('open')}

/* =====================================================
   NAVIGASI
   ===================================================== */
function navTo(p){
curPage=p;curMapel='';buildSB();
 $('tbTitle').textContent=p==='dash'?'Dashboard':p==='up'?'User Password':p==='set'?'Pengaturan':'Hasil STS';
 $('sb').classList.remove('open');$('sbOv').classList.remove('open');
const c=$('cArea');
if(p==='dash')rDash(c);else if(p==='up')rUP(c);else if(p==='set')rSet(c);else if(p==='sts')rStsPh(c);
}
function selMapel(id){
curPage='sts';curMapel=id;buildSB();
const m=MAPEL.find(x=>x.id===id);
 $('tbTitle').textContent='Hasil STS - '+m.nm;
 $('sb').classList.remove('open');$('sbOv').classList.remove('open');
rSts($('cArea'),m);
}

/* =====================================================
   DASHBOARD
   ===================================================== */
function rDash(c){
const pgm=getPgm();
let h=`<div class="page active"><div class="sg">`;
h+=`<div class="sc"><div class="si si-blue"><i class="fas fa-users"></i></div><div class="sf"><div class="sl">Total Peserta Didik</div><div class="sv">${MSTR.length}</div></div><img class="slogo" src="${LOGO_URL}" alt="Logo" onerror="this.style.display='none'"></div>`;
h+=`<div class="sc"><div class="si si-teal"><i class="fas fa-key"></i></div><div class="sf"><div class="sl">Jumlah Username & Password</div><div class="sv">${D_UP.length}</div></div></div>`;
if(role==='admin')h+=`<div class="sc"><div class="si si-green"><i class="fas fa-sign-in-alt"></i></div><div class="sf"><div class="sl">Total Akses Aplikasi</div><div class="sv">${getAC()}</div></div></div>`;
h+=`</div>`;
h+=`<div class="pgm-box"><h4><i class="fas fa-bullhorn"></i> Pengumuman</h4><p>${pgm.replace(/\n/g,'<br>')}</p><img class="jadwal-img" src="${JADWAL_URL}" alt="Jadwal OSN" onerror="this.style.display='none'"></div>`;
h+=`</div>`;c.innerHTML=h;
}

/* =====================================================
   HASIL STS
   ===================================================== */
function rStsPh(c){c.innerHTML=`<div class="page active"><div class="card"><div class="sts-ph"><i class="fas fa-hand-pointer"></i><h3>Pilih Mata Pelajaran</h3><p>Klik salah satu mata pelajaran di menu sidebar untuk melihat hasil STS.</p></div></div></div>`}
function rSts(c,m){
const data=m.fn();let h=`<div class="page active"><div class="card">`;
h+=`<div class="ct"><i class="fas fa-table"></i> Hasil STS - ${m.nm}</div>`;
if(role==='admin')h+=`<div class="bg" style="margin-bottom:14px"><button class="btn btn-green btn-sm" onclick="dlSTS('${m.id}')"><i class="fas fa-download"></i> Download CSV</button></div>`;
h+=`<div class="sw"><i class="fas fa-search"></i><input type="text" placeholder="Cari berdasarkan nama..." oninput="fSTS(this.value,'${m.id}')"></div>`;
h+=`<div class="tw"><table><thead><tr><th>No</th><th>Username</th><th>Nama</th><th>${m.kol}</th></tr></thead><tbody id="tb_${m.id}">`;
data.forEach((d,i)=>{h+=`<tr><td>${i+1}</td><td>${d[0]}</td><td>${d[1]}</td><td class="${sc(d[2])}">${d[2]}</td></tr>`});
h+=`</tbody></table></div></div></div>`;c.innerHTML=h;
}
function fSTS(q,id){
const m=MAPEL.find(s=>s.id===id),data=m.fn(),ql=q.toLowerCase().trim(),tb=$('tb_'+id);
let h='',no=0;
data.forEach(d=>{if(!ql||d[1].toLowerCase().includes(ql)){no++;h+=`<tr><td>${no}</td><td>${d[0]}</td><td>${d[1]}</td><td class="${sc(d[2])}">${d[2]}</td></tr>`}});
if(!h)h=`<tr><td colspan="4" style="text-align:center;color:var(--gray-400);padding:24px">Tidak ditemukan</td></tr>`;
tb.innerHTML=h;
}
function dlSTS(id){
const m=MAPEL.find(s=>s.id===id),data=m.fn();
let csv='No,Username,Nama,'+m.kol+'\n';
data.forEach((d,i)=>{csv+=(i+1)+',"'+d[0]+'","'+d[1]+'",'+d[2]+'\n'});
dlFile(csv,'STS_'+m.nm.replace(/ /g,'_')+'.csv','text/csv');toast('Data berhasil didownload','ok');
}

/* =====================================================
   USER PASSWORD
   ===================================================== */
function rUP(c){
let h=`<div class="page active"><div class="card">`;
h+=`<div class="ct"><i class="fas fa-key"></i> Data Username & Password</div>`;
if(role==='admin'){
h+=`<div class="bg"><button class="btn btn-green btn-sm" onclick="dlUP()"><i class="fas fa-download"></i> Download</button>`;
h+=`<button class="btn btn-white btn-sm" onclick="$('fImp').click()"><i class="fas fa-file-import"></i> Import</button>`;
h+=`<button class="btn btn-blue btn-sm" onclick="$('fUpl').click()"><i class="fas fa-upload"></i> Upload</button>`;
h+=`<input type="file" id="fImp" accept=".csv" style="display:none" onchange="impUP(this,true)">`;
h+=`<input type="file" id="fUpl" accept=".csv" style="display:none" onchange="impUP(this,false)"></div>`;
}
h+=`<div class="sw"><i class="fas fa-search"></i><input type="text" placeholder="Cari berdasarkan nama..." oninput="fUP(this.value)"></div>`;
h+=`<div class="tw"><table><thead><tr><th>No</th><th>Username</th><th>Nama</th><th>Password</th></tr></thead><tbody id="tbUP">`;
D_UP.forEach((d,i)=>{h+=`<tr><td>${i+1}</td><td>${d[0]}</td><td>${d[1]}</td><td><span class="pw-code">${d[2]}</span></td></tr>`});
h+=`</tbody></table></div></div></div>`;c.innerHTML=h;
}
function fUP(q){
const ql=q.toLowerCase().trim(),tb=$('tbUP');let h='',no=0;
D_UP.forEach(d=>{if(!ql||d[1].toLowerCase().includes(ql)){no++;h+=`<tr><td>${no}</td><td>${d[0]}</td><td>${d[1]}</td><td><span class="pw-code">${d[2]}</span></td></tr>`}});
if(!h)h=`<tr><td colspan="4" style="text-align:center;color:var(--gray-400);padding:24px">Tidak ditemukan</td></tr>`;
tb.innerHTML=h;
}
function dlUP(){
let csv='No,Username,Nama,Password\n';
D_UP.forEach((d,i)=>{csv+=(i+1)+',"'+d[0]+'","'+d[1]+'","'+d[2]+'"\n'});
dlFile(csv,'Username_Password.csv','text/csv');toast('Data berhasil didownload','ok');
}
function impUP(inp,rep){
const f=inp.files[0];if(!f)return;
const rd=new FileReader();
rd.onload=function(e){
try{
const ls=e.target.result.split('\n').filter(l=>l.trim());let cnt=0;
for(let i=1;i<ls.length;i++){
const cs=ls[i].match(/(".*?"|[^,]+)/g);
if(cs&&cs.length>=4){
const u=cs[1].replace(/"/g,'').trim(),n=cs[2].replace(/"/g,'').trim(),p=cs[3].replace(/"/g,'').trim();
if(u&&n&&p){
if(rep){const idx=D_UP.findIndex(x=>x[0]===u);if(idx===-1)D_UP.push([u,n,p]);else{D_UP[idx][1]=n;D_UP[idx][2]=p}}
else D_UP.push([u,n,p]);
cnt++;
}}}
toast('Berhasil import '+cnt+' data','ok');rUP($('cArea'));
}catch(err){toast('Gagal membaca file','err')}
};rd.readAsText(f);inp.value='';
}

/* =====================================================
   PENGATURAN
   ===================================================== */
function rSet(c){
const pgm=getPgm();let h=`<div class="page active">`;
h+=`<div class="card"><div class="ct"><i class="fas fa-image"></i> Logo Sekolah</div><img class="set-logo" src="${LOGO_URL}" alt="Logo" onerror="this.alt='Logo tidak tersedia'"></div>`;
h+=`<div class="card"><div class="ct"><i class="fas fa-database"></i> Kelola Data</div><p style="font-size:.82rem;color:var(--gray-500);margin-bottom:12px">Download seluruh data sebagai backup, atau import data yang sebelumnya dibuat.</p>`;
h+=`<div class="bg"><button class="btn btn-green" onclick="dlAll()"><i class="fas fa-download"></i> Download Semua Data</button>`;
h+=`<button class="btn btn-blue" onclick="$('fImpAll').click()"><i class="fas fa-file-import"></i> Import Data</button>`;
h+=`<input type="file" id="fImpAll" accept=".json" style="display:none" onchange="impAll(this)"></div></div>`;
h+=`<div class="card"><div class="ct"><i class="fas fa-bullhorn"></i> Pengaturan Pengumuman</div>`;
h+=`<div class="set-section"><label>Teks Pengumuman (ditampilkan di Dashboard)</label><textarea id="pgmIn">${pgm}</textarea>`;
h+=`<div class="bg" style="margin-top:10px"><button class="btn btn-blue" onclick="svPgm()"><i class="fas fa-save"></i> Simpan Pengumuman</button></div></div></div>`;
h+=`<div class="card"><div class="ct"><i class="fas fa-calendar-alt"></i> Jadwal Ujian OSN</div>`;
h+=`<img style="max-width:100%;border-radius:8px" src="${JADWAL_URL}" alt="Jadwal OSN" onerror="this.alt='Jadwal tidak tersedia';this.style.padding='16px';this.style.background='var(--blue-50)'"></div>`;
h+=`</div>`;c.innerHTML=h;
}
function svPgm(){const v=$('pgmIn').value.trim();if(!v){toast('Pengumuman tidak boleh kosong','err');return}setPgm(v);toast('Pengumuman berhasil disimpan','ok')}
function dlAll(){
const d={bindo:D_BI,agkat:D_AK,userpass:D_UP,pengumuman:getPgm(),accessCount:getAC(),exportedAt:new Date().toISOString()};
dlFile(JSON.stringify(d,null,2),'Data_STS_SMP_Karel.json','application/json');toast('Semua data berhasil didownload','ok');
}
function impAll(inp){
const f=inp.files[0];if(!f)return;
const rd=new FileReader();
rd.onload=function(e){
try{
const d=JSON.parse(e.target.result);let cnt=0;
if(d.bindo&&Array.isArray(d.bindo)){D_BI.length=0;d.bindo.forEach(x=>D_BI.push(x));cnt++}
if(d.agkat&&Array.isArray(d.agkat)){D_AK.length=0;d.agkat.forEach(x=>D_AK.push(x));cnt++}
if(d.userpass&&Array.isArray(d.userpass)){D_UP.length=0;d.userpass.forEach(x=>D_UP.push(x));cnt++}
if(d.pengumuman)setPgm(d.pengumuman);
if(d.accessCount!==undefined)localStorage.setItem('sts_ac',''+d.accessCount);
toast('Berhasil import '+cnt+' kategori data','ok');
}catch(err){toast('Gagal membaca file','err')}
};rd.readAsText(f);inp.value='';
}
</script>
</body>
</html>
