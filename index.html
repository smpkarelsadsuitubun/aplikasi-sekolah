function fkls(v){CF=v;rST();}
function rST(){
const su=MJ.find(s=>s.id===CS);
let rows=[];
if(su.z){rows=AS.map(s=>({n:s.n,u:s.u,nm:s.nm,s:0}));}
else{rows=su.d.map(s=>({n:s.n,u:s.u,nm:s.nm,s:s.s}));}
if(CF!=='semua')rows=rows.filter(r=>gk(r.u)===CF);
let h=`<table><thead><tr><th>No</th><th>Username</th><th>Nama</th><th>${su.nm}</th></tr></thead><tbody>`;
if(!rows.length)h+=`<tr><td colspan="4" style="text-align:center;padding:28px;color:var(--tx2)">Tidak ada data untuk kelas ini</td></tr>`;
rows.forEach(r=>{h+=`<tr><td>${r.n}</td><td>${r.u}</td><td>${r.nm}</td><td>${sb(r.s)}</td></tr>`;});
h+=`</tbody></table>`;
document.getElementById('stw').innerHTML=h;
const dl=document.getElementById('stdl');
if(dl&&CU.r==='admin')dl.innerHTML=`<button class="btn bp bsm" onclick="dlSTS('${CS}')"><i class="fas fa-download"></i> Download ${su.nm}</button>`;
}
function dlSTS(id){
const su=MJ.find(s=>s.id===id);let rows=[];
if(su.z)rows=AS.map(s=>[s.n,s.u,s.nm,0]);else rows=su.d.map(s=>[s.n,s.u,s.nm,s.s]);
let csv='No,Username,Nama,'+su.nm+'\n';rows.forEach(r=>csv+=r.join(',')+'\n');
dlF(csv,'STS_'+su.nm.replace(/ /g,'_')+'.csv','text/csv');toast('Data berhasil diunduh!');
}

function dlF(c,n,t){const b=new Blob([c],{type:t+';charset=utf-8'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=n;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);}
