<title>SMP Karel Sadsuitubun - Sistem STS</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#0d47a1;--primary-m:#1565c0;--primary-l:#42a5f5;--accent:#00acc1;
--bg:#e8f0fe;--card:#fff;--text:#0d1b3e;--muted:#5a6a85;--border:#c5d5ea;
--success:#1b8a3d;--danger:#c62828;--warning:#e65100;
--sidebar:#0a2e6e;--sidebar-h:#123d8a;--sidebar-t:#d6e8ff;
--radius:10px;--shadow:0 2px 16px rgba(10,46,110,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);background:var(--bg);min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Sora',sans-serif;font-weight:700;color:var(--primary)}
/* ===== LOGIN ===== */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;
background:linear-gradient(135deg,#0a2e6e 0%,#1565c0 50%,#0d47a1 100%);position:relative;overflow:hidden}
.login-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18;animation:blobFloat 8s ease-in-out infinite}
.login-blob:nth-child(1){width:320px;height:320px;background:#00acc1;top:-60px;left:-80px}
.login-blob:nth-child(2){width:260px;height:260px;background:#42a5f5;bottom:-40px;right:-60px;animation-delay:3s}
.login-blob:nth-child(3){width:200px;height:200px;background:#80deea;top:40%;left:60%;animation-delay:5s}
@keyframes blobFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,15px) scale(.95)}}
.login-card{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-radius:18px;padding:36px 32px;width:92%;max-width:400px;box-shadow:0 16px 48px rgba(0,0,0,.25);position:relative;z-index:2}
.login-card .logo-img{width:90px;height:90px;border-radius:14px;object-fit:contain;margin:0 auto 12px;display:block;background:#f0f5ff}
.login-card h2{text-align:center;font-size:1.15rem;margin-bottom:4px}
.login-card .sub{text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:22px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.78rem;font-weight:600;margin-bottom:5px;color:var(--primary)}
.form-group input{width:100%;padding:10px 12px 10px 38px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;transition:.2s;background:#f8faff}
.form-group input:focus{outline:none;border-color:var(--primary-l);box-shadow:0 0 0 3px rgba(66,165,245,.15)}
.form-group .input-wrap{position:relative}
.form-group .input-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;border-radius:8px;font-size:.85rem;font-weight:600;font-family:inherit;cursor:pointer;transition:.2s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-m)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#15732f}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#a11b1b}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--primary)}
.btn-outline:hover{background:var(--bg)}
.btn-sm{padding:6px 14px;font-size:.78rem}
.btn-full{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}
.login-btn{width:100%;padding:12px;font-size:.95rem;margin-top:6px;border-radius:10px}
.yt-link{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;padding:10px;background:#ff0000;color:#fff;border-radius:8px;text-decoration:none;font-size:.78rem;font-weight:600;transition:.2s}
.yt-link:hover{background:#cc0000;transform:translateY(-1px)}
.login-error{background:#fdecea;color:var(--danger);padding:8px 12px;border-radius:6px;font-size:.8rem;margin-bottom:12px;display:none}
/* ===== MAIN APP ===== */
#mainApp{display:none;min-height:100vh}
.sidebar{position:fixed;top:0;left:0;width:250px;height:100vh;background:var(--sidebar);color:var(--sidebar-t);z-index:100;overflow-y:auto;transition:transform .3s;display:flex;flex-direction:column}
.sidebar-header{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sidebar-header img{width:38px;height:38px;border-radius:8px;object-fit:contain;background:#fff}
.sidebar-header .app-title{font-family:'Sora';font-size:.85rem;font-weight:700;line-height:1.2}
.sidebar-header .app-sub{font-size:.65rem;opacity:.7}
.sidebar-nav{flex:1;padding:10px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:.82rem;cursor:pointer;transition:.15s;border-left:3px solid transparent;color:var(--sidebar-t);text-decoration:none}
.nav-item:hover{background:var(--sidebar-h);border-left-color:var(--primary-l)}
.nav-item.active{background:var(--sidebar-h);border-left-color:var(--accent);color:#fff;font-weight:600}
.nav-item i{width:18px;text-align:center;font-size:.9rem}
.nav-sub{padding-left:18px}
.nav-sub .nav-item{padding:8px 18px 8px 46px;font-size:.78rem;border-left:none}
.nav-sub .nav-item.active{background:rgba(0,172,193,.15);color:#fff;border-left:none}
.nav-sub-toggle{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:.82rem;cursor:pointer;transition:.15s;border-left:3px solid transparent;color:var(--sidebar-t)}
.nav-sub-toggle:hover{background:var(--sidebar-h)}
.nav-sub-toggle.active{border-left-color:var(--accent);color:#fff;font-weight:600}
.nav-sub-toggle i.chevron{margin-left:auto;transition:transform .25s;font-size:.7rem}
.nav-sub-toggle.open i.chevron{transform:rotate(90deg)}
.nav-sub{max-height:0;overflow:hidden;transition:max-height .35s ease}
.nav-sub.open{max-height:600px}
.sidebar-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-footer .nav-item{padding:8px 0}
/* Top bar */
.topbar{position:fixed;top:0;left:250px;right:0;height:56px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:90;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.topbar-left{display:flex;align-items:center;gap:12px}
.hamburger{display:none;background:none;border:none;font-size:1.2rem;color:var(--primary);cursor:pointer;padding:4px}
.topbar-title{font-family:'Sora';font-size:.95rem;font-weight:700;color:var(--primary)}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-right .user-badge{font-size:.75rem;color:var(--muted);background:var(--bg);padding:4px 10px;border-radius:6px}
.topbar-right .btn-logout{font-size:.78rem}
/* Content */
.content{margin-left:250px;margin-top:56px;padding:24px;min-height:calc(100vh - 56px)}
.page{display:none;animation:fadeUp .3s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* Cards */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:18px;border:1px solid rgba(197,213,234,.4)}
.card-title{font-size:.9rem;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--primary)}
.card-title i{color:var(--primary-l)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:18px}
.stat-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;display:flex;align-items:center;gap:14px;border:1px solid rgba(197,213,234,.4);position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,rgba(66,165,245,.08),transparent);transform:translate(20px,-20px)}
.stat-icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.stat-icon.blue{background:linear-gradient(135deg,#e3f2fd,#bbdefb);color:var(--primary)}
.stat-icon.teal{background:linear-gradient(135deg,#e0f7fa,#b2ebf2);color:var(--accent)}
.stat-icon.green{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);color:var(--success)}
.stat-info .stat-label{font-size:.72rem;color:var(--muted);font-weight:500}
.stat-info .stat-value{font-family:'Sora';font-size:1.5rem;font-weight:800;color:var(--primary);line-height:1.2}
.stat-logo{width:60px;height:60px;border-radius:10px;object-fit:contain;margin-left:auto;flex-shrink:0;background:#f5f8ff}
/* Pengumuman */
.pengumuman-box{background:linear-gradient(135deg,#e3f2fd,#fff);border-left:4px solid var(--primary-l);border-radius:0 var(--radius) var(--radius) 0;padding:16px 18px;margin-bottom:16px}
.pengumuman-box h4{font-size:.85rem;margin-bottom:6px;color:var(--primary)}
.pengumuman-box p{font-size:.82rem;color:var(--text);line-height:1.6}
.jadwal-img{max-width:100%;border-radius:8px;margin-top:10px;box-shadow:var(--shadow)}
/* Tables */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.8rem}
thead{background:var(--primary);color:#fff}
th{padding:10px 12px;text-align:left;font-weight:600;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid #eef2f8}
tbody tr:nth-child(even){background:#f5f8ff}
tbody tr:hover{background:#e3f0ff}
.score-high{color:var(--success);font-weight:700}
.score-mid{color:var(--warning);font-weight:600}
.score-low{color:var(--danger);font-weight:700}
/* Search */
.search-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-input{flex:1;min-width:200px;padding:9px 12px 9px 36px;border:1.5px solid var(--border);border-radius:8px;font-size:.83rem;font-family:inherit;background:#fff;position:relative}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.8rem}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;border:1.5px solid var(--border);border-radius:8px;font-size:.83rem;font-family:inherit;background:#fff}
.search-wrap input:focus{outline:none;border-color:var(--primary-l);box-shadow:0 0 0 3px rgba(66,165,245,.12)}
/* Settings */
.settings-logo{width:120px;height:120px;border-radius:14px;object-fit:contain;background:#f5f8ff;border:2px solid var(--border);margin-bottom:14px}
.settings-section{margin-bottom:22px}
.settings-section label{display:block;font-size:.78rem;font-weight:600;margin-bottom:6px;color:var(--primary)}
.settings-section textarea{width:100%;min-height:100px;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.83rem;resize:vertical}
.settings-section textarea:focus{outline:none;border-color:var(--primary-l)}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
/* Toast */
.toast-container{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:8px;font-size:.82rem;font-weight:500;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:toastIn .3s ease;display:flex;align-items:center;gap:8px;max-width:340px}
.toast.success{background:#1b8a3d}
.toast.error{background:#c62828}
.toast.info{background:var(--primary)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
/* Overlay */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:95}
/* Responsive */
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.sidebar-overlay.open{display:block}
.topbar{left:0}
.content{margin-left:0;padding:16px}
.hamburger{display:block}
.stat-grid{grid-template-columns:1fr}
.search-bar{flex-direction:column}
.search-wrap{min-width:100%}
.btn-group{flex-direction:column}
.btn-group .btn{width:100%}
.login-card{padding:28px 22px}
}
@media(min-width:769px) and (max-width:1024px){
.sidebar{width:220px}
.topbar{left:220px}
.content{margin-left:220px}
}
/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#b0c4de;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#8aa8c8}
/* Print */
@media print{.sidebar,.topbar,.hamburger,.btn{display:none!important}.content{margin:0;padding:10px}}
.hidden{display:none!important}
</style>

const DEFAULT_PENGUMUMAN='Jangan lupa subscribe YouTube Channel SMP Karel Sadsuitubun. Ujian OSN akan disiarkan secara live melalui YouTube. Saksikan dan dukung bersama. Jadwal Ujian OSN akan disampaikan kemudian. Terima kasih.';

/* ===================== STATE ===================== */
let role=''; // 'admin' atau 'umum'
let curPage='dashboard';
let curSubject='';

/* ===================== UTILITAS ===================== */
function $(id){return document.getElementById(id)}
function toast(msg,type='info'){
  const c=$('toastContainer');
  const t=document.createElement('div');
  t.className='toast '+type;
  t.innerHTML='<i class="fas fa-'+(type==='success'?'check-circle':type==='error'?'times-circle':'info-circle')+'"></i> '+msg;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(40px)';t.style.transition='.3s';setTimeout(()=>t.remove(),300)},3000);
}
function scoreClass(v){
  if(v>=80)return 'score-high';
  if(v>=60)return 'score-mid';
  return 'score-low';
}
function getPengumuman(){return localStorage.getItem('sts_pengumuman')||DEFAULT_PENGUMUMAN}
function setPengumuman(t){localStorage.setItem('sts_pengumuman',t)}
function getAccessCount(){return parseInt(localStorage.getItem('sts_access_count')||'0')}
function incAccessCount(){localStorage.setItem('sts_access_count',''+(getAccessCount()+1))}

/* ===================== AUTH ===================== */
function doLogin(){
  const u=$('loginUser').value.trim();
  const p=$('loginPass').value.trim();
  const err=$('loginError');
  if(u==='admin'&&p==='admin'){role='admin';err.style.display='none';showApp()}
  else if(u==='ptsks'&&p==='ptsks'){role='umum';err.style.display='none';showApp()}
  else{err.textContent='Username atau password salah!';err.style.display='block'}
}
function doLogout(){
  role='';curPage='dashboard';curSubject='';
  $('mainApp').style.display='none';
  $('loginPage').style.display='flex';
  $('loginUser').value='';$('loginPass').value='';
}
// Enter pada input login
 $('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
 $('loginUser').addEventListener('keydown',e=>{if(e.key==='Enter')$('loginPass').focus()});

function showApp(){
  incAccessCount();
  $('loginPage').style.display='none';
  $('mainApp').style.display='block';
  $('userBadge').textContent=role==='admin'?'Administrator':'Umum';
  buildSidebar();
  navigateTo('dashboard');
}

/* ===================== SIDEBAR ===================== */
function buildSidebar(){
  const nav=$('sidebarNav');
  let html=`<div class="nav-item${curPage==='dashboard'?' active':''}" onclick="navigateTo('dashboard')"><i class="fas fa-home"></i> Dashboard</div>`;
  // Hasil STS
  html+=`<div class="nav-sub-toggle${curPage==='sts'?' active':''}${curPage==='sts'?' open':''}" onclick="toggleSTSMenu(this)"><i class="fas fa-chart-bar"></i> Hasil STS<i class="fas fa-chevron-right chevron"></i></div>`;
  html+=`<div class="nav-sub${curPage==='sts'?' open':''}">`;
  SUBJECTS.forEach(s=>{
    html+=`<div class="nav-item${curSubject===s.id?' active':''}" onclick="selectSubject('${s.id}')">${s.name}</div>`;
  });
  html+=`</div>`;
  // User Password
  html+=`<div class="nav-item${curPage==='userpass'?' active':''}" onclick="navigateTo('userpass')"><i class="fas fa-key"></i> User Password</div>`;
  // Pengaturan (hanya admin)
  if(role==='admin'){
    html+=`<div class="nav-item${curPage==='settings'?' active':''}" onclick="navigateTo('settings')"><i class="fas fa-cog"></i> Pengaturan</div>`;
  }
  nav.innerHTML=html;
}
function toggleSTSMenu(el){
  el.classList.toggle('open');
  const sub=el.nextElementSibling;
  sub.classList.toggle('open');
}
function toggleSidebar(){
  $('sidebar').classList.toggle('open');
  $('sidebarOverlay').classList.toggle('open');
}

/* ===================== NAVIGASI ===================== */
function navigateTo(page){
  curPage=page;curSubject='';
  buildSidebar();
  $('topbarTitle').textContent=page==='dashboard'?'Dashboard':page==='userpass'?'User Password':page==='settings'?'Pengaturan':'Hasil STS';
  // Tutup sidebar mobile
  $('sidebar').classList.remove('open');
  $('sidebarOverlay').classList.remove('open');
  const c=$('contentArea');
  if(page==='dashboard')renderDashboard(c);
  else if(page==='userpass')renderUserPass(c);
  else if(page==='settings')renderSettings(c);
  else if(page==='sts'){renderSTSPlaceholder(c)}
}
function selectSubject(id){
  curPage='sts';curSubject=id;
  buildSidebar();
  const s=SUBJECTS.find(x=>x.id===id);
  $('topbarTitle').textContent='Hasil STS - '+s.name;
  $('sidebar').classList.remove('open');
  $('sidebarOverlay').classList.remove('open');
  renderSTS($('contentArea'),s);
}
function renderSTSPlaceholder(c){
  c.innerHTML=`<div class="page active"><div class="card" style="text-align:center;padding:60px 20px"><i class="fas fa-hand-pointer" style="font-size:2.5rem;color:var(--primary-l);margin-bottom:14px;display:block"></i><h3 style="margin-bottom:8px">Pilih Mata Pelajaran</h3><p style="color:var(--muted);font-size:.85rem">Klik salah satu mata pelajaran di menu sidebar untuk melihat hasil STS.</p></div></div>`;
}

/* ===================== DASHBOARD ===================== */
function renderDashboard(c){
  const totalPD=M.length;
  const totalUP=UP.length;
  const akses=getAccessCount();
  let cards=`
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-icon blue"><i class="fas fa-users"></i></div>
      <div class="stat-info"><div class="stat-label">Total Peserta Didik</div><div class="stat-value">${totalPD}</div></div>
      <img class="stat-logo" src="${LOGO_URL}" alt="Logo" onerror="this.style.display='none'">
    </div>
    <div class="stat-card">
      <div class="stat-icon teal"><i class="fas fa-key"></i></div>
      <div class="stat-info"><div class="stat-label">Jumlah Username & Password</div><div class="stat-value">${totalUP}</div></div>
    </div>`;
  if(role==='admin'){
    cards+=`
    <div class="stat-card">
      <div class="stat-icon green"><i class="fas fa-sign-in-alt"></i></div>
      <div class="stat-info"><div class="stat-label">Total Akses Aplikasi</div><div class="stat-value">${akses}</div></div>
    </div>`;
  }
  cards+=`</div>`;
  // Pengumuman
  const pgm=getPengumuman();
  cards+=`
  <div class="pengumuman-box">
    <h4><i class="fas fa-bullhorn"></i> Pengumuman</h4>
    <p>${pgm.replace(/\n/g,'<br>')}</p>
    <img class="jadwal-img" src="${JADWAL_URL}" alt="Jadwal OSN" onerror="this.style.display='none'">
  </div>`;
  c.innerHTML=`<div class="page active">${cards}</div>`;
}

/* ===================== HASIL STS ===================== */
function renderSTS(c,subj){
  const data=subj.data();
  let html=`<div class="page active"><div class="card">`;
  html+=`<div class="card-title"><i class="fas fa-table"></i> Hasil STS - ${subj.name}</div>`;
  // Download hanya admin
  if(role==='admin'){
    html+=`<div style="margin-bottom:12px"><button class="btn btn-success btn-sm" onclick="downloadSTS('${subj.id}')"><i class="fas fa-download"></i> Download</button></div>`;
  }
  // Pencarian
  html+=`<div class="search-wrap" style="margin-bottom:12px"><i class="fas fa-search"></i><input type="text" placeholder="Cari berdasarkan nama..." oninput="filterSTS(this.value,'${subj.id}')"></div>`;
  html+=`<div class="table-wrap"><table><thead><tr><th>No</th><th>Username</th><th>Nama</th><th>${subj.col}</th></tr></thead><tbody id="stsBody_${subj.id}">`;
  data.forEach((d,i)=>{
    const sc=d[2];
    html+=`<tr><td>${i+1}</td><td>${d[0]}</td><td>${d[1]}</td><td class="${scoreClass(sc)}">${sc}</td></tr>`;
  });
  html+=`</tbody></table></div></div></div>`;
  c.innerHTML=html;
}
function filterSTS(q,sid){
  const subj=SUBJECTS.find(s=>s.id===sid);
  const data=subj.data();
  const ql=q.toLowerCase().trim();
  const tb=$('stsBody_'+sid);
  let html='';
  let no=0;
  data.forEach(d=>{
    if(!ql||d[1].toLowerCase().includes(ql)){
      no++;
      html+=`<tr><td>${no}</td><td>${d[0]}</td><td>${d[1]}</td><td class="${scoreClass(d[2])}">${d[2]}</td></tr>`;
    }
  });
  if(!html)html=`<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:20px">Tidak ditemukan</td></tr>`;
  tb.innerHTML=html;
}
function downloadSTS(sid){
  const subj=SUBJECTS.find(s=>s.id===sid);
  const data=subj.data();
  let csv='No,Username,Nama,'+subj.col+'\n';
  data.forEach((d,i)=>{csv+=(i+1)+',"'+d[0]+'","'+d[1]+'",'+d[2]+'\n'});
  downloadFile(csv,'STS_'+subj.name.replace(/ /g,'_')+'.csv','text/csv');
  toast('Data berhasil didownload','success');
}

/* ===================== USER PASSWORD ===================== */
function renderUserPass(c){
  let html=`<div class="page active"><div class="card">`;
  html+=`<div class="card-title"><i class="fas fa-key"></i> Data Username & Password</div>`;
  // Tombol admin saja
  if(role==='admin'){
    html+=`<div class="btn-group" style="margin-bottom:12px">
      <button class="btn btn-success btn-sm" onclick="downloadUserPass()"><i class="fas fa-download"></i> Download</button>
      <button class="btn btn-outline btn-sm" onclick="$('importUP').click()"><i class="fas fa-file-import"></i> Import</button>
      <button class="btn btn-primary btn-sm" onclick="$('uploadUP').click()"><i class="fas fa-upload"></i> Upload</button>
      <input type="file" id="importUP" accept=".csv" style="display:none" onchange="importUserPass(this,true)">
      <input type="file" id="uploadUP" accept=".csv" style="display:none" onchange="importUserPass(this,false)">
    </div>`;
  }
  // Pencarian
  html+=`<div class="search-wrap" style="margin-bottom:12px"><i class="fas fa-search"></i><input type="text" placeholder="Cari berdasarkan nama..." oninput="filterUP(this.value)"></div>`;
  html+=`<div class="table-wrap"><table><thead><tr><th>No</th><th>Username</th><th>Nama</th><th>Password</th></tr></thead><tbody id="upBody">`;
  UP.forEach((d,i)=>{
    html+=`<tr><td>${i+1}</td><td>${d[0]}</td><td>${d[1]}</td><td><code style="background:#e3f2fd;padding:2px 8px;border-radius:4px;font-size:.8rem">${d[2]}</code></td></tr>`;
  });
  html+=`</tbody></table></div></div></div>`;
  c.innerHTML=html;
}
function filterUP(q){
  const ql=q.toLowerCase().trim();
  const tb=$('upBody');
  let html='';let no=0;
  UP.forEach(d=>{
    if(!ql||d[1].toLowerCase().includes(ql)){
      no++;
      html+=`<tr><td>${no}</td><td>${d[0]}</td><td>${d[1]}</td><td><code style="background:#e3f2fd;padding:2px 8px;border-radius:4px;font-size:.8rem">${d[2]}</code></td></tr>`;
    }
  });
  if(!html)html=`<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:20px">Tidak ditemukan</td></tr>`;
  tb.innerHTML=html;
}
function downloadUserPass(){
  let csv='No,Username,Nama,Password\n';
  UP.forEach((d,i)=>{csv+=(i+1)+',"'+d[0]+'","'+d[1]+'","'+d[2]+'"\n'});
  downloadFile(csv,'Username_Password.csv','text/csv');
  toast('Data berhasil didownload','success');
}
function importUserPass(input,replace){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const lines=e.target.result.split('\n').filter(l=>l.trim());
      if(lines.length<2){toast('File kosong atau tidak valid','error');return}
      let imported=0;
      for(let i=1;i<lines.length;i++){
        const cols=lines[i].match(/(".*?"|[^,]+)/g);
        if(cols&&cols.length>=4){
          const u=cols[1].replace(/"/g,'').trim();
          const n=cols[2].replace(/"/g,'').trim();
          const p=cols[3].replace(/"/g,'').trim();
          if(u&&n&&p){
            if(replace){
              // Replace: hanya tambahkan jika belum ada
              const idx=UP.findIndex(x=>x[0]===u);
              if(idx===-1)UP.push([u,n,p]);
              else{UP[idx][1]=n;UP[idx][2]=p}
            }else{
              UP.push([u,n,p]);
            }
            imported++;
          }
        }
      }
      toast('Berhasil import '+imported+' data','success');
      renderUserPass($('contentArea'));
    }catch(err){toast('Gagal membaca file: '+err.message,'error')}
  };
  reader.readAsText(file);
  input.value='';
}

/* ===================== PENGATURAN ===================== */
function renderSettings(c){
  const pgm=getPengumuman();
  let html=`<div class="page active">`;
  // Logo
  html+=`<div class="card">
    <div class="card-title"><i class="fas fa-image"></i> Logo Sekolah</div>
    <img class="settings-logo" src="${LOGO_URL}" alt="Logo Sekolah" onerror="this.alt='Logo tidak tersedia'">
  </div>`;
  // Download & Import seluruh data
  html+=`<div class="card">
    <div class="card-title"><i class="fas fa-database"></i> Kelola Data</div>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:12px">Download seluruh data aplikasi sebagai file backup, atau import data yang sebelumnya sudah dibuat.</p>
    <div class="btn-group">
      <button class="btn btn-success" onclick="downloadAllData()"><i class="fas fa-download"></i> Download Semua Data</button>
      <button class="btn btn-primary" onclick="$('importAll').click()"><i class="fas fa-file-import"></i> Import Data</button>
      <input type="file" id="importAll" accept=".json" style="display:none" onchange="importAllData(this)">
    </div>
  </div>`;
  // Pengumuman
  html+=`<div class="card">
    <div class="card-title"><i class="fas fa-bullhorn"></i> Pengaturan Pengumuman</div>
    <div class="settings-section">
      <label>Teks Pengumuman (ditampilkan di Dashboard)</label>
      <textarea id="pengumumanInput">${pgm}</textarea>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="savePengumuman()"><i class="fas fa-save"></i> Simpan Pengumuman</button>
      </div>
    </div>
  </div>`;
  // Jadwal
  html+=`<div class="card">
    <div class="card-title"><i class="fas fa-calendar-alt"></i> Jadwal Ujian OSN</div>
    <img style="max-width:100%;border-radius:8px" src="${JADWAL_URL}" alt="Jadwal OSN" onerror="this.alt='Jadwal tidak tersedia';this.style.padding='20px';this.style.background='#f5f8ff'">
  </div>`;
  html+=`</div>`;
  c.innerHTML=html;
}
function savePengumuman(){
  const v=$('pengumumanInput').value.trim();
  if(!v){toast('Pengumuman tidak boleh kosong','error');return}
  setPengumuman(v);
  toast('Pengumuman berhasil disimpan','success');
}
function downloadAllData(){
  const allData={
    bindo:BI, agkat:AK, bing:BG, PKn:PK, IPA:PA, agisl:AI, aprot:Ap, mtk:MT, pjok:PJ, ips:IP, tik:TI, userpass:UP,
    pengumuman:getPengumuman(),
    accessCount:getAccessCount(),
    exportedAt:new Date().toISOString()
  };
  const json=JSON.stringify(allData,null,2);
  downloadFile(json,'Data_STS_SMP_Karel.json','application/json');
  toast('Semua data berhasil didownload','success');
}
function importAllData(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      let count=0;
      if(data.bindo&&Array.isArray(data.bindo)){BI.length=0;data.bindo.forEach(d=>BI.push(d));count++}
      if(data.agkat&&Array.isArray(data.agkat)){AK.length=0;data.agkat.forEach(d=>AK.push(d));count++}
      if(data.agkat&&Array.isArray(data.bing)){BG.length=0;data.agkat.forEach(d=>BG.push(d));count++}
      if(data.agkat&&Array.isArray(data.agkat)){PK.length=0;data.agkat.forEach(d=>PK.push(d));count++}
      if(data.agkat&&Array.isArray(data.agkat)){PA.length=0;data.agkat.forEach(d=>PA.push(d));count++}
      if(data.agkat&&Array.isArray(data.agkat)){AI.length=0;data.agkat.forEach(d=>AI.push(d));count++} 
      if(data.agkat&&Array.isArray(data.agkat)){MT.length=0;data.agkat.forEach(d=>MT.push(d));count++} 
      if(data.agkat&&Array.isArray(data.agkat)){AP.length=0;data.agkat.forEach(d=>AP.push(d));count++}  
      if(data.agkat&&Array.isArray(data.agkat)){PJ.length=0;data.agkat.forEach(d=>AP.push(d));count++}
      if(data.agkat&&Array.isArray(data.agkat)){IP.length=0;data.agkat.forEach(d=>AP.push(d));count++}
      if(data.agkat&&Array.isArray(data.agkat)){TI.length=0;data.agkat.forEach(d=>AP.push(d));count++}

      if(data.userpass&&Array.isArray(data.userpass)){UP.length=0;data.userpass.forEach(d=>UP.push(d));count++}
      if(data.pengumuman)setPengumuman(data.pengumuman);
      if(data.accessCount!==undefined)localStorage.setItem('sts_access_count',''+data.accessCount);
      toast('Berhasil import '+count+' kategori data','success');
    }catch(err){toast('Gagal membaca file: '+err.message,'error')}
  };
  reader.readAsText(file);
  input.value='';
}

/* ===================== DOWNLOAD HELPER ===================== */
function downloadFile(content,filename,type){
  const blob=new Blob([content],{type:type+';charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
